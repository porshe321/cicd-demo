name: CI-CD Static Analysis, Testing, Docker Build and Deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  bash_lint:
    name: Bash Lint (ShellCheck)
    runs-on: [self-hosted, linux, shell, dev]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Run ShellCheck
        run: shellcheck deploy.sh

  yaml_lint:
    name: Run YamlLint
    runs-on: [self-hosted, linux, shell, dev]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Run YamlLint
        run: yamllint config.yml

  python_unit_test:
    name: Run PyTest
    needs: [bash_lint, yaml_lint]
    runs-on: [self-hosted, linux, shell, dev]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Run PyTest
        run: python3 -m pytest test_app.py

  docker_build:
    name: Docker Build and Push
    needs: python_unit_test
    runs-on: [self-hosted, linux, shell, dev]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and Push Docker Image
        run: |
          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/cicd-demo"
          IMAGE_NAME=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')
          docker build -t $IMAGE_NAME:latest -t $IMAGE_NAME:${{ github.run_number }} .
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ github.run_number }}

  deploy_to_test:
    name: Deploy to Target Server
    needs: docker_build
    runs-on: [self-hosted, linux, shell, dev]
    steps:
      - name: Deploy via native SSH
        run: |
          # 1. Записываем приватный ключ из секретов во временный файл и даем ему права
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > id_rsa
          chmod 400 id_rsa
          
          # 2. Переводим имя репозитория в нижний регистр для Docker
          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/cicd-demo"
          IMAGE_NAME=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')
          
          # 3. Подключаемся по SSH одной командой и выполняем ТЗ без сторонних плагинов
          ssh -i id_rsa -o StrictHostKeyChecking=no ${{ secrets.TARGET_USER }}@${{ secrets.TARGET_HOST }} "
            echo '${{ secrets.GITHUB_TOKEN }}' | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin &&
            sudo docker stop my-python-app || true &&
            sudo docker rm my-python-app || true &&
            sudo docker pull \$IMAGE_NAME:latest &&
            sudo docker run -d --name my-python-app -p 80:3010 \$IMAGE_NAME:latest
          "
          
          # 4. Удаляем временный ключ для безопасности
          rm -f id_rsa


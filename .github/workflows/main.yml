name: CI-CD Static Analysis and Testing

on:
  push:
    branches: [ main ]

jobs:
  # --- СТАДИЯ ЛИНТИНГА ---
  bash_lint:
    name: Bash Lint (ShellCheck)
    runs-on: [self-hosted, linux, shell, dev]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run ShellCheck
        run: shellcheck deploy.sh

  yaml_lint:
    name: Run YamlLint
    runs-on: [self-hosted, linux, shell, dev]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run YamlLint
        run: yamllint config.yml

  # --- СТАДИЯ ТЕСТИРОВАНИЯ ---
  python_unit_test:
    name: Run PyTest
    needs: [bash_lint, yaml_lint] # Запустится только если ОБА линтера прошли успешно
    runs-on: [self-hosted, linux, shell, dev]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run PyTest
        run: python3 -m pytest test_app.py

